<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicle Document Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #66717f;
      --line: #d9e0e8;
      --paper: #f6f8fb;
      --panel: #ffffff;
      --green: #16835a;
      --green-soft: #dff5e9;
      --amber: #b56b00;
      --amber-soft: #fff0cd;
      --red: #bd2d2d;
      --red-soft: #ffe2e0;
      --blue: #246bfe;
      --teal: #057b8d;
      --violet: #7548d8;
      --pink: #d23b82;
      --shadow: 0 24px 60px rgba(24, 34, 45, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #eef7ff 0%, #f4efff 35%, #fff2f7 68%, #effbf4 100%);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(140deg, #17212b, #246bfe 60%, #10a37f);
      color: white;
      box-shadow: 0 14px 32px rgba(36, 107, 254, .24);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2vw, 2.25rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 5px 0 0;
      font-size: .96rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #eaf0f8;
      color: var(--ink);
      font-weight: 750;
      border: 1px solid transparent;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(24, 34, 45, .1);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--blue), var(--violet));
      color: #fff;
      box-shadow: 0 10px 22px rgba(75, 77, 210, .22);
    }

    .btn.ghost {
      background: #ffffff;
      border-color: #cdd9eb;
      color: #3153a7;
    }

    .sync-btn {
      background: #e5f8ef;
      border-color: #a9dfc6;
      color: #126447;
    }

    .sync-btn[data-state="syncing"] {
      background: #fff3cf;
      border-color: #f0cf76;
      color: #8d5a00;
    }

    .sync-btn[data-state="error"] {
      background: var(--red-soft);
      border-color: #f4b4af;
      color: var(--red);
    }

    .sync-btn[data-state="offline"] {
      background: #ffffff;
      border-color: #cdd9eb;
      color: #3153a7;
    }

    .sync-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 3px rgba(22, 131, 90, .12);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 16px;
      min-height: 112px;
      border: 1px solid rgba(23, 33, 43, .08);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(24, 34, 45, .07);
      backdrop-filter: blur(16px);
    }

    .stat:nth-child(1) {
      background: linear-gradient(135deg, #e5efff, #ffffff);
      border-color: #b7ccff;
      color: #164ea8;
    }

    .stat:nth-child(2) {
      background: linear-gradient(135deg, #ffe4e6, #ffffff);
      border-color: #ffb8bd;
      color: var(--red);
    }

    .stat:nth-child(3) {
      background: linear-gradient(135deg, #fff0c7, #ffffff);
      border-color: #ffd273;
      color: var(--amber);
    }

    .stat:nth-child(4) {
      background: linear-gradient(135deg, #e9e0ff, #ffffff);
      border-color: #c8b3ff;
      color: var(--violet);
    }

    .stat span {
      display: block;
      color: currentColor;
      opacity: .76;
      font-size: .82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .stat strong {
      display: block;
      margin-top: 12px;
      font-size: 2.05rem;
      line-height: 1;
    }

    .workspace {
      display: grid;
      grid-template-columns: 365px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(23, 33, 43, .08);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .form-panel {
      position: sticky;
      top: 18px;
      padding: 18px;
      border-top: 5px solid var(--violet);
    }

    .list-panel {
      border-top: 5px solid var(--teal);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    label {
      color: #344253;
      font-size: .78rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(36, 107, 254, .62);
      box-shadow: 0 0 0 4px rgba(36, 107, 254, .11);
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .list-panel {
      min-height: 620px;
      overflow: hidden;
    }

    .tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid rgba(23, 33, 43, .08);
      background: rgba(255, 255, 255, .66);
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      padding-left: 40px;
    }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 1px;
    }

    .chip {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      white-space: nowrap;
      background: #edf2f7;
      color: #3b4652;
      font-weight: 850;
      font-size: .88rem;
    }

    .chip.active {
      background: #17212b;
      color: white;
    }

    .vehicle-list {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(23, 33, 43, .09);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(24, 34, 45, .06);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      margin-bottom: 8px;
    }

    .plate {
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: .03em;
      overflow-wrap: anywhere;
    }

    .type {
      flex: 0 0 auto;
      padding: 5px 8px;
      border-radius: 8px;
      color: #0f5967;
      background: #dff5f8;
      font-weight: 850;
      font-size: .78rem;
    }

    .meta {
      color: var(--muted);
      font-size: .92rem;
      overflow-wrap: anywhere;
    }

    .docs {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .doc {
      min-height: 86px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 10px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      background: #f8fafc;
    }

    .doc-name {
      color: #344253;
      font-weight: 850;
      font-size: .83rem;
    }

    .doc-date {
      font-size: .98rem;
      font-weight: 850;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: .76rem;
      font-weight: 900;
    }

    .ok { color: var(--green); background: var(--green-soft); }
    .soon { color: var(--amber); background: var(--amber-soft); }
    .overdue { color: var(--red); background: var(--red-soft); }
    .missing { color: #5d6671; background: #e8edf2; }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: start;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: #edf2f7;
    }

    .icon-btn.delete {
      color: var(--red);
      background: var(--red-soft);
    }

    .empty {
      padding: 54px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
      font-size: 1.15rem;
    }

    .file-input {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(23, 33, 43, .56);
    }

    .modal[hidden] {
      display: none;
    }

    .modal-card {
      width: min(620px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      padding: 20px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 28px 80px rgba(23, 33, 43, .28);
      border-top: 6px solid var(--blue);
    }

    .modal-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .modal-head h2 {
      font-size: 1.25rem;
    }

    .close-btn {
      flex: 0 0 auto;
    }

    .sync-form {
      display: grid;
      gap: 15px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      color: var(--ink);
      background: #f9fbfd;
      font: 500 .85rem/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(36, 107, 254, .62);
      box-shadow: 0 0 0 4px rgba(36, 107, 254, .11);
    }

    .key-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .sync-note {
      min-height: 22px;
      margin: 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .sync-note.error {
      color: var(--red);
      font-weight: 750;
    }

    .sync-note.success {
      color: var(--green);
      font-weight: 750;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .btn.danger {
      margin-left: auto;
      background: var(--red-soft);
      color: var(--red);
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
      }

      .dashboard {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 22px, 1180px);
        padding-top: 18px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .btn {
        flex: 1 1 140px;
      }

      .tools {
        grid-template-columns: 1fr;
      }

      .docs {
        grid-template-columns: 1fr 1fr;
      }

      .card {
        grid-template-columns: 1fr;
      }

      .card-actions {
        justify-content: flex-end;
      }
    }

    @media (max-width: 470px) {
      .dashboard, .form-grid, .docs, .form-actions {
        grid-template-columns: 1fr;
      }

      .field {
        grid-column: 1 / -1;
      }

      .mark {
        width: 42px;
        height: 42px;
      }

      .key-row {
        grid-template-columns: 1fr;
      }

      .modal-actions .btn {
        flex: 1 1 150px;
      }

      .btn.danger {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Vehicle tracker header">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg width="27" height="27" viewBox="0 0 24 24" fill="none">
            <path d="M5 17h14M7 17v2m10-2v2M6.4 13h11.2c.9 0 1.6.7 1.6 1.6V17H4.8v-2.4c0-.9.7-1.6 1.6-1.6Zm1.1 0 1.2-4.1c.2-.7.8-1.1 1.5-1.1h3.6c.7 0 1.3.5 1.5 1.1l1.2 4.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1>Vehicle Document Tracker</h1>
          <p class="subtitle">Fitness, insurance, tax, permit and pollution expiry in one clean view.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn sync-btn" id="syncBtn" type="button" data-state="offline">
          <span class="sync-dot" aria-hidden="true"></span>
          <span id="syncBtnText">Set up sync</span>
        </button>
        <button class="btn ghost" id="importBtn" type="button">Import</button>
        <button class="btn ghost" id="exportBtn" type="button">Export</button>
        <input class="file-input" id="importFile" type="file" accept="application/json" />
      </div>
    </section>

    <section class="dashboard" aria-label="Summary">
      <article class="stat"><span>Total vehicles</span><strong id="totalCount">0</strong></article>
      <article class="stat"><span>Overdue docs</span><strong id="overdueCount">0</strong></article>
      <article class="stat"><span>Due in 30 days</span><strong id="soonCount">0</strong></article>
      <article class="stat"><span>Missing dates</span><strong id="missingCount">0</strong></article>
    </section>

    <section class="workspace">
      <aside class="panel form-panel">
        <div class="panel-head">
          <div>
            <h2 id="formTitle">Add vehicle</h2>
            <p class="hint">Use real expiry dates to get automatic status.</p>
          </div>
        </div>

        <form id="vehicleForm" autocomplete="off">
          <div class="form-grid">
            <div class="field wide">
              <label for="plate">Vehicle number</label>
              <input id="plate" name="plate" placeholder="KL 07 AB 1234" required />
            </div>
            <div class="field">
              <label for="owner">Owner / driver</label>
              <input id="owner" name="owner" placeholder="Name" />
            </div>
            <div class="field">
              <label for="type">Vehicle type</label>
              <select id="type" name="type">
                <option>Car</option>
                <option>Bike</option>
                <option>Auto</option>
                <option>Van</option>
                <option>Truck</option>
                <option>Bus</option>
                <option>Other</option>
              </select>
            </div>
            <div class="field">
              <label for="fitness">Fitness expiry</label>
              <input id="fitness" name="fitness" type="date" />
            </div>
            <div class="field">
              <label for="insurance">Insurance expiry</label>
              <input id="insurance" name="insurance" type="date" />
            </div>
            <div class="field">
              <label for="tax">Tax expiry</label>
              <input id="tax" name="tax" type="date" />
            </div>
            <div class="field">
              <label for="pollution">Pollution expiry</label>
              <input id="pollution" name="pollution" type="date" />
            </div>
            <div class="field">
              <label for="permit">Permit expiry</label>
              <input id="permit" name="permit" type="date" />
            </div>
            <div class="field">
              <label for="service">Service due</label>
              <input id="service" name="service" type="date" />
            </div>
            <div class="field wide">
              <label for="notes">Notes</label>
              <input id="notes" name="notes" placeholder="Policy number, agent, reminder note..." />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn primary" id="saveBtn" type="submit">Save vehicle</button>
            <button class="btn" id="clearBtn" type="button">Clear</button>
          </div>
        </form>
      </aside>

      <section class="panel list-panel" aria-label="Vehicle list">
        <div class="tools">
          <div class="search">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m21 21-4.35-4.35M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="searchInput" placeholder="Search number, owner, type or notes" />
          </div>
          <div class="filters" aria-label="Filters">
            <button class="chip active" data-filter="all" type="button">All</button>
            <button class="chip" data-filter="overdue" type="button">Overdue</button>
            <button class="chip" data-filter="soon" type="button">Due soon</button>
            <button class="chip" data-filter="missing" type="button">Missing</button>
            <button class="chip" data-filter="ok" type="button">Good</button>
          </div>
        </div>
        <div class="vehicle-list" id="vehicleList"></div>
      </section>
    </section>
  </main>

  <div class="modal" id="syncModal" hidden>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="syncTitle">
      <div class="modal-head">
        <div>
          <h2 id="syncTitle">Cloud sync</h2>
          <p class="hint">Firebase Realtime Database</p>
        </div>
        <button class="icon-btn close-btn" id="closeSyncBtn" type="button" title="Close">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <form class="sync-form" id="syncForm">
        <div class="field" hidden>
          <label for="firebaseConfig">Firebase web configuration</label>
          <textarea id="firebaseConfig" spellcheck="false" placeholder='{"apiKey":"...","authDomain":"...","databaseURL":"...","projectId":"...","appId":"..."}' required></textarea>
        </div>
        <div class="field">
          <label for="syncKey">Private sync key</label>
          <div class="key-row">
            <input id="syncKey" type="password" minlength="24" autocomplete="off" required />
            <button class="btn" id="generateKeyBtn" type="button">Generate key</button>
          </div>
        </div>
        <p class="sync-note" id="syncNote" aria-live="polite">Not connected</p>
        <div class="modal-actions">
          <button class="btn primary" type="submit">Connect &amp; sync</button>
          <button class="btn" id="showKeyBtn" type="button">Show key</button>
          <button class="btn danger" id="disconnectBtn" type="button">Disconnect</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    const storageKey = "vehicle-document-tracker-v1";
    const cloudStorageKey = "vehicle-document-tracker-cloud-v1";
    const firebaseVersion = "12.15.0";
    const defaultFirebaseConfig = Object.freeze({
      projectId: "cps-app-new-92158535-6a4da",
      appId: "1:568258961042:web:f2d6bf4d05645546a2504b",
      databaseURL: "https://cps-app-new-92158535-6a4da-default-rtdb.asia-southeast1.firebasedatabase.app",
      storageBucket: "cps-app-new-92158535-6a4da.firebasestorage.app",
      apiKey: "AIzaSyCVkRYISKG0NZhPrhuRsV_6ZHbkwZDYUW4",
      authDomain: "cps-app-new-92158535-6a4da.firebaseapp.com",
      messagingSenderId: "568258961042"
    });
    const docs = [
      ["fitness", "Fitness"],
      ["insurance", "Insurance"],
      ["tax", "Tax"],
      ["pollution", "Pollution"],
      ["permit", "Permit"],
      ["service", "Service"]
    ];

    let vehicles = loadVehicles();
    let editingId = null;
    let activeFilter = "all";
    let cloud = {
      connected: false,
      app: null,
      reference: null,
      set: null,
      unsubscribe: null,
      writeTimer: null
    };

    const form = document.querySelector("#vehicleForm");
    const list = document.querySelector("#vehicleList");
    const searchInput = document.querySelector("#searchInput");
    const formTitle = document.querySelector("#formTitle");
    const saveBtn = document.querySelector("#saveBtn");
    const syncBtn = document.querySelector("#syncBtn");
    const syncBtnText = document.querySelector("#syncBtnText");
    const syncModal = document.querySelector("#syncModal");
    const syncForm = document.querySelector("#syncForm");
    const firebaseConfigInput = document.querySelector("#firebaseConfig");
    const syncKeyInput = document.querySelector("#syncKey");
    const syncNote = document.querySelector("#syncNote");

    function loadVehicles() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function saveVehicles() {
      localStorage.setItem(storageKey, JSON.stringify(vehicles));
      queueCloudSave();
    }

    function loadCloudSettings() {
      try {
        return JSON.parse(localStorage.getItem(cloudStorageKey)) || null;
      } catch {
        return null;
      }
    }

    function setSyncState(state, text, note = "", noteType = "") {
      syncBtn.dataset.state = state;
      syncBtnText.textContent = text;
      syncNote.textContent = note || text;
      syncNote.className = `sync-note${noteType ? ` ${noteType}` : ""}`;
    }

    function openSyncModal() {
      const settings = loadCloudSettings();
      firebaseConfigInput.value = JSON.stringify(settings?.config || defaultFirebaseConfig, null, 2);
      if (settings) {
        syncKeyInput.value = settings.syncKey || "";
      }
      syncModal.hidden = false;
      syncKeyInput.focus();
    }

    function closeSyncModal() {
      syncModal.hidden = true;
    }

    function generateSyncKey() {
      const bytes = crypto.getRandomValues(new Uint8Array(24));
      return Array.from(bytes, value => value.toString(16).padStart(2, "0")).join("");
    }

    async function hashSyncKey(value) {
      const encoded = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", encoded);
      return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function parseFirebaseConfig(value) {
      const start = value.indexOf("{");
      const end = value.lastIndexOf("}");
      if (start < 0 || end <= start) {
        throw new Error("Paste the Firebase configuration object.");
      }
      const text = value.slice(start, end + 1)
        .replace(/([{,]\s*)([A-Za-z_$][\w$]*)(\s*:)/g, '$1"$2"$3')
        .replace(/,\s*}/g, "}");
      const config = JSON.parse(text);
      const required = ["apiKey", "authDomain", "databaseURL", "projectId", "appId"];
      if (!required.every(key => config[key])) {
        throw new Error("Firebase configuration is missing a required value.");
      }
      return config;
    }

    async function connectCloud(config, syncKey, saveSettings = true) {
      setSyncState("syncing", "Connecting...", "Connecting to Firebase");

      if (cloud.unsubscribe) cloud.unsubscribe();
      if (cloud.app) {
        try {
          const { deleteApp } = await import(`https://www.gstatic.com/firebasejs/${firebaseVersion}/firebase-app.js`);
          await deleteApp(cloud.app);
        } catch {
          // Reconnection can continue with a new app instance.
        }
      }

      const [{ initializeApp }, databaseModule] = await Promise.all([
        import(`https://www.gstatic.com/firebasejs/${firebaseVersion}/firebase-app.js`),
        import(`https://www.gstatic.com/firebasejs/${firebaseVersion}/firebase-database.js`)
      ]);

      const app = initializeApp(config, `vehicle-tracker-${Date.now()}`);
      const db = databaseModule.getDatabase(app);
      const syncId = await hashSyncKey(syncKey);
      const reference = databaseModule.ref(db, `sync/${syncId}`);

      cloud = {
        connected: true,
        app,
        reference,
        set: databaseModule.set,
        unsubscribe: null,
        writeTimer: null
      };

      if (saveSettings) {
        localStorage.setItem(cloudStorageKey, JSON.stringify({ config, syncKey }));
      }

      cloud.unsubscribe = databaseModule.onValue(reference, snapshot => {
        const remote = snapshot.val();
        if (remote && remote.updatedAt) {
          vehicles = Array.isArray(remote.vehicles) ? remote.vehicles : [];
          localStorage.setItem(storageKey, JSON.stringify(vehicles));
          resetForm();
          render();
          setSyncState("connected", "Synced", "Connected and up to date", "success");
        } else {
          pushCloudNow();
        }
      }, error => {
        cloud.connected = false;
        setSyncState("error", "Sync error", error.message || "Could not read cloud data", "error");
      });
    }

    function queueCloudSave() {
      if (!cloud.connected || !cloud.reference || !cloud.set) return;
      clearTimeout(cloud.writeTimer);
      setSyncState("syncing", "Syncing...", "Saving changes");
      cloud.writeTimer = setTimeout(pushCloudNow, 250);
    }

    async function pushCloudNow() {
      if (!cloud.connected || !cloud.reference || !cloud.set) return;
      try {
        await cloud.set(cloud.reference, {
          vehicles,
          updatedAt: Date.now()
        });
        setSyncState("connected", "Synced", "Connected and up to date", "success");
      } catch (error) {
        setSyncState("error", "Sync error", error.message || "Could not save changes", "error");
      }
    }

    async function disconnectCloud() {
      if (cloud.unsubscribe) cloud.unsubscribe();
      clearTimeout(cloud.writeTimer);
      if (cloud.app) {
        try {
          const { deleteApp } = await import(`https://www.gstatic.com/firebasejs/${firebaseVersion}/firebase-app.js`);
          await deleteApp(cloud.app);
        } catch {
          // Local mode still works if Firebase cleanup fails.
        }
      }
      cloud = {
        connected: false,
        app: null,
        reference: null,
        set: null,
        unsubscribe: null,
        writeTimer: null
      };
      localStorage.removeItem(cloudStorageKey);
      firebaseConfigInput.value = "";
      syncKeyInput.value = "";
      setSyncState("offline", "Set up sync", "Disconnected");
    }

    function startOfToday() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function daysUntil(dateValue) {
      if (!dateValue) return null;
      const target = new Date(dateValue + "T00:00:00");
      const diff = target - startOfToday();
      return Math.ceil(diff / 86400000);
    }

    function docStatus(dateValue) {
      const days = daysUntil(dateValue);
      if (days === null) return "missing";
      if (days < 0) return "overdue";
      if (days <= 30) return "soon";
      return "ok";
    }

    function statusText(dateValue) {
      const days = daysUntil(dateValue);
      if (days === null) return "Missing";
      if (days < 0) return `${Math.abs(days)}d late`;
      if (days === 0) return "Today";
      if (days <= 30) return `${days}d left`;
      return "Good";
    }

    function formatDate(dateValue) {
      if (!dateValue) return "No date";
      return new Intl.DateTimeFormat("en-IN", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(dateValue + "T00:00:00"));
    }

    function worstStatus(vehicle) {
      const statuses = docs.map(([key]) => docStatus(vehicle[key]));
      if (statuses.includes("overdue")) return "overdue";
      if (statuses.includes("soon")) return "soon";
      if (statuses.includes("missing")) return "missing";
      return "ok";
    }

    function vehicleMatchesFilter(vehicle) {
      if (activeFilter === "all") return true;
      if (activeFilter === "ok") return worstStatus(vehicle) === "ok";
      return docs.some(([key]) => docStatus(vehicle[key]) === activeFilter);
    }

    function vehicleMatchesSearch(vehicle) {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return true;
      return [vehicle.plate, vehicle.owner, vehicle.type, vehicle.notes]
        .filter(Boolean)
        .some(value => value.toLowerCase().includes(query));
    }

    function updateStats() {
      const counts = { overdue: 0, soon: 0, missing: 0 };
      vehicles.forEach(vehicle => {
        docs.forEach(([key]) => {
          const status = docStatus(vehicle[key]);
          if (counts[status] !== undefined) counts[status] += 1;
        });
      });
      document.querySelector("#totalCount").textContent = vehicles.length;
      document.querySelector("#overdueCount").textContent = counts.overdue;
      document.querySelector("#soonCount").textContent = counts.soon;
      document.querySelector("#missingCount").textContent = counts.missing;
    }

    function render() {
      updateStats();
      const shown = vehicles
        .filter(vehicleMatchesFilter)
        .filter(vehicleMatchesSearch)
        .sort((a, b) => statusWeight(worstStatus(a)) - statusWeight(worstStatus(b)) || a.plate.localeCompare(b.plate));

      if (!shown.length) {
        list.innerHTML = `
          <div class="empty">
            <strong>No vehicles found</strong>
            Add a vehicle or change the search/filter to see records here.
          </div>
        `;
        return;
      }

      list.innerHTML = shown.map(vehicle => `
        <article class="card">
          <div>
            <div class="card-title">
              <div class="plate">${escapeHtml(vehicle.plate)}</div>
              <span class="type">${escapeHtml(vehicle.type || "Vehicle")}</span>
              <span class="badge ${worstStatus(vehicle)}">${labelFor(worstStatus(vehicle))}</span>
            </div>
            <div class="meta">${escapeHtml([vehicle.owner, vehicle.notes].filter(Boolean).join(" • ") || "No owner or notes added")}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" type="button" title="Edit vehicle" data-edit="${vehicle.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 20h4.5L19 9.5 14.5 5 4 15.5V20Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="m13 6.5 4.5 4.5" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="icon-btn delete" type="button" title="Delete vehicle" data-delete="${vehicle.id}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14m-9 4v6m4-6v6M9 7l1-2h4l1 2m-8 0 1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="docs">
            ${docs.map(([key, name]) => {
              const status = docStatus(vehicle[key]);
              return `
                <div class="doc">
                  <div class="doc-name">${name}</div>
                  <div>
                    <div class="doc-date">${formatDate(vehicle[key])}</div>
                    <span class="badge ${status}">${statusText(vehicle[key])}</span>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </article>
      `).join("");
    }

    function statusWeight(status) {
      return { overdue: 0, soon: 1, missing: 2, ok: 3 }[status] ?? 4;
    }

    function labelFor(status) {
      return { overdue: "Needs renewal", soon: "Due soon", missing: "Dates missing", ok: "All good" }[status];
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function getFormData() {
      const data = Object.fromEntries(new FormData(form).entries());
      return {
        id: editingId || crypto.randomUUID(),
        plate: data.plate.trim().toUpperCase(),
        owner: data.owner.trim(),
        type: data.type,
        fitness: data.fitness,
        insurance: data.insurance,
        tax: data.tax,
        pollution: data.pollution,
        permit: data.permit,
        service: data.service,
        notes: data.notes.trim()
      };
    }

    function resetForm() {
      editingId = null;
      form.reset();
      formTitle.textContent = "Add vehicle";
      saveBtn.textContent = "Save vehicle";
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      const vehicle = getFormData();
      const index = vehicles.findIndex(item => item.id === vehicle.id);
      if (index >= 0) vehicles[index] = vehicle;
      else vehicles.push(vehicle);
      saveVehicles();
      resetForm();
      render();
    });

    document.querySelector("#clearBtn").addEventListener("click", resetForm);
    searchInput.addEventListener("input", render);

    document.querySelectorAll("[data-filter]").forEach(button => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach(item => item.classList.toggle("active", item === button));
        render();
      });
    });

    list.addEventListener("click", event => {
      const editButton = event.target.closest("[data-edit]");
      const deleteButton = event.target.closest("[data-delete]");

      if (editButton) {
        const vehicle = vehicles.find(item => item.id === editButton.dataset.edit);
        if (!vehicle) return;
        editingId = vehicle.id;
        docs.forEach(([key]) => form.elements[key].value = vehicle[key] || "");
        form.elements.plate.value = vehicle.plate || "";
        form.elements.owner.value = vehicle.owner || "";
        form.elements.type.value = vehicle.type || "Car";
        form.elements.notes.value = vehicle.notes || "";
        formTitle.textContent = "Edit vehicle";
        saveBtn.textContent = "Update vehicle";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      if (deleteButton) {
        const vehicle = vehicles.find(item => item.id === deleteButton.dataset.delete);
        if (!vehicle) return;
        if (confirm(`Delete ${vehicle.plate}?`)) {
          vehicles = vehicles.filter(item => item.id !== vehicle.id);
          saveVehicles();
          if (editingId === vehicle.id) resetForm();
          render();
        }
      }
    });

    document.querySelector("#exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(vehicles, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `vehicle-documents-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });

    document.querySelector("#importBtn").addEventListener("click", () => {
      document.querySelector("#importFile").click();
    });

    document.querySelector("#importFile").addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error("Invalid file");
          vehicles = imported.map(item => ({ ...item, id: item.id || crypto.randomUUID() }));
          saveVehicles();
          resetForm();
          render();
        } catch {
          alert("This file could not be imported. Please choose a tracker JSON export.");
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    });

    syncBtn.addEventListener("click", openSyncModal);
    document.querySelector("#closeSyncBtn").addEventListener("click", closeSyncModal);
    syncModal.addEventListener("click", event => {
      if (event.target === syncModal) closeSyncModal();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !syncModal.hidden) closeSyncModal();
    });

    document.querySelector("#generateKeyBtn").addEventListener("click", () => {
      syncKeyInput.value = generateSyncKey();
      syncKeyInput.type = "text";
      syncNote.textContent = "New private key generated";
      syncNote.className = "sync-note success";
    });

    document.querySelector("#showKeyBtn").addEventListener("click", event => {
      const showing = syncKeyInput.type === "text";
      syncKeyInput.type = showing ? "password" : "text";
      event.currentTarget.textContent = showing ? "Show key" : "Hide key";
    });

    document.querySelector("#disconnectBtn").addEventListener("click", async () => {
      await disconnectCloud();
    });

    syncForm.addEventListener("submit", async event => {
      event.preventDefault();
      try {
        const config = defaultFirebaseConfig;
        const syncKey = syncKeyInput.value.trim();
        if (syncKey.length < 24) throw new Error("Use a private sync key with at least 24 characters.");
        await connectCloud(config, syncKey);
        closeSyncModal();
      } catch (error) {
        setSyncState("error", "Sync error", error.message || "Could not connect", "error");
      }
    });

    render();
    const savedCloudSettings = loadCloudSettings();
    const sharedSyncKey = new URLSearchParams(window.location.hash.slice(1)).get("sync");
    const startupSettings = sharedSyncKey?.length >= 24
      ? { config: defaultFirebaseConfig, syncKey: sharedSyncKey }
      : savedCloudSettings;
    if (startupSettings?.config && startupSettings?.syncKey) {
      localStorage.setItem(cloudStorageKey, JSON.stringify(startupSettings));
      connectCloud(startupSettings.config, startupSettings.syncKey, false).catch(error => {
        setSyncState("error", "Sync error", error.message || "Could not reconnect", "error");
      });
    }
  </script>
</body>
</html>
